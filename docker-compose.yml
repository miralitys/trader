services:
  postgres:
    image: postgres:15
    container_name: trader-postgres
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: trader-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: trader-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    container_name: trader-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_QUEUES: ${CELERY_QUEUES:-default,backtests}
      CELERY_WITH_BEAT: ${CELERY_WITH_BEAT:-1}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/run_worker.py"

  frontend:
    build:
      context: ./frontend
    container_name: trader-frontend
    env_file:
      - .env
    environment:
      BACKEND_PROXY_TARGET: ${BACKEND_PROXY_TARGET:-backend:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  flower:
    image: mher/flower:2.0
    container_name: trader-flower
    command: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  pgdata:
