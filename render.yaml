databases:
  - name: trader-postgres
    databaseName: trader
    user: trader
    plan: free

services:
  - type: keyvalue
    name: trader-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: trader-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh ./scripts/start_web.sh
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: PAPER_ENABLED
        value: "1"
      - key: LIVE_ENABLED
        value: "0"
      - key: LOG_LEVEL
        value: "INFO"
      - key: BACKFILL_5M_DAYS
        value: "730"
      - key: BACKFILL_15M_DAYS
        value: "365"
      - key: BACKFILL_1H_DAYS
        value: "730"
      - key: BACKFILL_MAX_SYMBOLS_PER_RUN
        value: "8"
      - key: BACKFILL_MAX_CHUNKS_PER_TF
        value: "120"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: trader-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh ./scripts/start_worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAPER_ENABLED
        value: "1"
      - key: LIVE_ENABLED
        value: "0"
      - key: CELERY_QUEUES
        value: "default"
      - key: CELERY_WITH_BEAT
        value: "0"
      - key: CELERY_CONCURRENCY
        value: "1"
      - key: CELERY_POOL
        value: "solo"
      - key: CELERY_MAX_TASKS_PER_CHILD
        value: "20"
      - key: CELERY_PREFETCH_MULTIPLIER
        value: "1"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: BACKFILL_5M_DAYS
        value: "730"
      - key: BACKFILL_15M_DAYS
        value: "365"
      - key: BACKFILL_1H_DAYS
        value: "730"
      - key: BACKFILL_MAX_SYMBOLS_PER_RUN
        value: "8"
      - key: BACKFILL_MAX_CHUNKS_PER_TF
        value: "120"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false

  - type: worker
    name: trader-backtest-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh ./scripts/start_worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAPER_ENABLED
        value: "0"
      - key: LIVE_ENABLED
        value: "0"
      - key: CELERY_QUEUES
        value: "backtests"
      - key: CELERY_WITH_BEAT
        value: "0"
      - key: CELERY_CONCURRENCY
        value: "1"
      - key: CELERY_POOL
        value: "solo"
      - key: CELERY_MAX_TASKS_PER_CHILD
        value: "10"
      - key: CELERY_PREFETCH_MULTIPLIER
        value: "1"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: BACKFILL_5M_DAYS
        value: "730"
      - key: BACKFILL_15M_DAYS
        value: "365"
      - key: BACKFILL_1H_DAYS
        value: "730"
      - key: BACKFILL_MAX_SYMBOLS_PER_RUN
        value: "8"
      - key: BACKFILL_MAX_CHUNKS_PER_TF
        value: "120"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false

  - type: worker
    name: trader-history-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh ./scripts/start_worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAPER_ENABLED
        value: "0"
      - key: LIVE_ENABLED
        value: "0"
      - key: CELERY_QUEUES
        value: "history"
      - key: CELERY_WITH_BEAT
        value: "1"
      - key: CELERY_BEAT_MODE
        value: "history_only"
      - key: CELERY_CONCURRENCY
        value: "2"
      - key: CELERY_POOL
        value: "prefork"
      - key: CELERY_MAX_TASKS_PER_CHILD
        value: "10"
      - key: CELERY_PREFETCH_MULTIPLIER
        value: "1"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: BACKFILL_5M_DAYS
        value: "730"
      - key: BACKFILL_15M_DAYS
        value: "365"
      - key: BACKFILL_1H_DAYS
        value: "730"
      - key: BACKFILL_MAX_SYMBOLS_PER_RUN
        value: "30"
      - key: BACKFILL_MAX_CHUNKS_PER_TF
        value: "720"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false

  - type: web
    name: trader-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BACKEND_PROXY_TARGET
        sync: false
      - key: BACKEND_FALLBACK_URL
        sync: false
