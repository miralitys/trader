databases:
  - name: trader-postgres
    databaseName: trader
    user: trader
    plan: free

services:
  - type: keyvalue
    name: trader-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: trader-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "if [ -d backend ]; then cd backend; fi; until alembic upgrade head; do sleep 5; done; uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: PAPER_ENABLED
        value: "1"
      - key: LIVE_ENABLED
        value: "0"
      - key: LOG_LEVEL
        value: "INFO"
      - key: BACKFILL_5M_DAYS
        value: "180"
      - key: BACKFILL_15M_DAYS
        value: "365"
      - key: BACKFILL_1H_DAYS
        value: "730"
      - key: BACKFILL_MAX_SYMBOLS_PER_RUN
        value: "3"
      - key: BACKFILL_MAX_CHUNKS_PER_TF
        value: "6"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: trader-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "if [ -d backend ]; then cd backend; fi; until alembic upgrade head; do sleep 5; done; python3 ./scripts/run_worker.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAPER_ENABLED
        value: "1"
      - key: LIVE_ENABLED
        value: "0"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: BACKFILL_5M_DAYS
        value: "180"
      - key: BACKFILL_15M_DAYS
        value: "365"
      - key: BACKFILL_1H_DAYS
        value: "730"
      - key: BACKFILL_MAX_SYMBOLS_PER_RUN
        value: "3"
      - key: BACKFILL_MAX_CHUNKS_PER_TF
        value: "6"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false

  - type: web
    name: trader-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BACKEND_PROXY_TARGET
        sync: false
      - key: BACKEND_FALLBACK_URL
        sync: false
