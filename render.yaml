databases:
  - name: trader-postgres
    databaseName: trader
    user: trader
    plan: free

services:
  - type: keyvalue
    name: trader-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: trader-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: PAPER_ENABLED
        value: "1"
      - key: LIVE_ENABLED
        value: "0"
      - key: LOG_LEVEL
        value: "INFO"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: trader-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app worker --beat --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trader-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trader-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAPER_ENABLED
        value: "1"
      - key: LIVE_ENABLED
        value: "0"
      - key: COINBASE_API_BASE_URL
        value: "https://api.coinbase.com"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: COINBASE_API_PASSPHRASE
        sync: false

  - type: web
    name: trader-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://trader-backend.onrender.com"
